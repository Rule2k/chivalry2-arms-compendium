name: Deploy Main To VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: chivalry2-production
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: "22"
  DEPLOY_PATH: /var/www/chivalry2

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Check Out Repository
        uses: actions/checkout@v4

      - name: Set Up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Run Unit Tests
        run: npm run test:unit

      - name: Configure SSH
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" | tr -d '\r' > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts
          cat <<EOF > ~/.ssh/config
          Host chivalry2-vps
            HostName ${VPS_HOST}
            User ${VPS_USER}
            IdentityFile ~/.ssh/id_ed25519
            IdentitiesOnly yes
            StrictHostKeyChecking yes
          EOF
          chmod 600 ~/.ssh/config

      - name: Ensure Deploy Directory Exists
        run: ssh chivalry2-vps "mkdir -p '${DEPLOY_PATH}'"

      - name: Sync Repository To VPS
        run: |
          rsync -az --delete \
            -e "ssh -F $HOME/.ssh/config" \
            --exclude '.git' \
            --exclude 'node_modules' \
            --exclude '.next' \
            --exclude '.DS_Store' \
            --exclude '.superpowers' \
            --exclude 'coverage' \
            --exclude 'e2e/result' \
            --exclude 'playwright-report' \
            --exclude 'test-results' \
            --exclude '*.tsbuildinfo' \
            ./ "chivalry2-vps:${DEPLOY_PATH}/"

      - name: Deploy On VPS With Docker Compose
        run: |
          ssh chivalry2-vps "
            set -e
            cd '${DEPLOY_PATH}'
            docker compose down --remove-orphans || true
            docker rm -f chivalry2 || true
            docker compose up -d --build --remove-orphans
            for attempt in \$(seq 1 30); do
              status=\$(docker inspect --format '{{if .State.Health}}{{.State.Health.Status}}{{else}}none{{end}}' chivalry2 2>/dev/null || true)
              if [ \"\$status\" = healthy ]; then
                curl -fsS http://127.0.0.1:3000 >/dev/null
                exit 0
              fi
              sleep 2
            done
            docker compose ps
            docker logs chivalry2
            exit 1
          "
